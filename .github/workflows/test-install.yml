name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Verify the package installs cleanly for every OS / Python / extras combo ──
  install:
    name: "install [${{ matrix.extras || 'base' }}] py${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        extras: ["", "tachypy", "dev", "all"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true   # needed for 3.14, harmless for earlier versions

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        shell: bash
        run: |
          EXTRAS="${{ matrix.extras }}"
          if [ -n "$EXTRAS" ]; then
            pip install ".[$EXTRAS]"
          else
            pip install "."
          fi

      - name: Confirm package is registered
        run: pip show tachywooting

      - name: List installed extras
        shell: bash
        run: |
          python -c "
          import importlib.util, sys
          for pkg in ['h5py', 'numpy', 'matplotlib', 'rich', 'tqdm', 'cffi']:
              ok = importlib.util.find_spec(pkg) is not None
              print(f'  {pkg:<20} {\"OK\" if ok else \"MISSING\"}')
          "

  # ── Run hardware-free pytest suite across all OS / Python versions ──────────
  test:
    name: "pytest py${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with dev extras
        run: pip install ".[dev]"

      - name: Show test environment
        run: pip list

      - name: Run tests
        run: pytest tests/ -v --tb=short
